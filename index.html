<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>캠핑캐치 — 김포 3시간 오토캠핑</title>
  <meta name="description" content="김포에서 3시간 이내 오토캠핑장을 날씨·계절·거리로 추천해 드려요">
  <link rel="stylesheet" href="css/styles.css">
  <!-- PWA: 홈 화면에 추가하면 앱처럼 -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#24503B">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="캠핑캐치">
</head>
<body>
  <header class="appbar">
    <div class="appbar-in">
      <span class="logo">⛺</span>
      <span class="brand-txt"><b>캠핑캐치</b><span>김포 3시간 이내 · 오토캠핑</span></span>
    </div>
  </header>

  <main class="wrap">
    <div class="controls">
      <div class="preset-row" id="presetRow">
        <span class="preset-lbl">언제 갈까요?</span>
        <button class="qbtn" data-preset="tmr" aria-pressed="false">내일</button>
        <button class="qbtn" data-preset="week" aria-pressed="false">이번 주말</button>
        <button class="qbtn" data-preset="next" aria-pressed="false">다음 주말</button>
      </div>
      <div class="ctrl-row">
        <div class="field">
          <label for="startInp">시작일</label>
          <input class="inp" type="date" id="startInp">
        </div>
        <div class="field">
          <label for="endInp">종료일</label>
          <input class="inp" type="date" id="endInp">
        </div>
        <div class="field">
          <label for="sortSel">정렬</label>
          <select class="inp" id="sortSel">
            <option value="reco">추천순</option>
            <option value="near">가까운순</option>
            <option value="auto">오토 규모순</option>
            <option value="season">계절 적합순</option>
          </select>
        </div>
        <div class="field">
          <label>유형</label>
          <span class="fixed-chip">🚗 오토캠핑</span>
        </div>
      </div>
      <div class="region-row" id="regionRow"></div>
      <div class="region-hint">지역을 누르면 그 지역만 · 아무것도 안 누르면 전체를 보여줘요</div>
    </div>

    <div class="season-banner" id="seasonBanner"></div>
    <div class="wx-note" id="wxNote"></div>

    <div class="sec-h"><h2 id="curTitle">이 계절 추천</h2><span class="cnt">시즌 맞춤</span></div>
    <div class="cur-row" id="curRow"></div>

    <div class="results-head"><h2>오토캠핑 추천</h2><span class="rc" id="resultCount"></span></div>
    <div class="list" id="list"></div>

    <footer>
      캠핑캐치 · 김포 3시간 이내 오토캠핑<br>
      날씨 제공 <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> · 캠핑장 정보 한국관광공사 고캠핑
    </footer>
  </main>

  <div class="backdrop" id="backdrop"></div>
  <aside class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="캠핑장 상세"></aside>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/sites.js"></script>
  <script src="js/links.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/app.js"></script>
  <script>
    /* 서비스워커 등록 (HTTPS에서만 동작 · 로컬 file://에선 조용히 무시) */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>

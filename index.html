<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>캠핑캐치 — 김포 3시간 오토캠핑</title>
  <meta name="description" content="김포 기준 3시간 이내 오토캠핑장을 계절·거리로 추천하는 대시보드 (고캠핑 실데이터)">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="appbar">
    <div class="appbar-in">
      <span class="logo">⛺</span>
      <span class="brand-txt"><b>캠핑캐치</b><span>김포 3시간 이내 · 오토캠핑 · 실데이터</span></span>
    </div>
  </header>
  <div class="proto-note">실데이터: 고캠핑(한국관광공사) 공개 API · <b>가격·실시간 자리·후기</b>는 예약처에서 확인</div>

  <main class="wrap">
    <div class="controls">
      <div class="ctrl-row">
        <div class="field">
          <label for="dateInp">언제 가세요? (계절 추천)</label>
          <input class="inp" type="date" id="dateInp" value="2026-08-15">
        </div>
        <div class="field">
          <label for="sortSel">정렬</label>
          <select class="inp" id="sortSel">
            <option value="reco">추천순 (계절+시설+거리)</option>
            <option value="near">가까운순</option>
            <option value="auto">오토 규모순</option>
            <option value="season">계절 적합순</option>
          </select>
        </div>
        <div class="field">
          <label>유형</label>
          <span class="fixed-chip">🚗 오토캠핑</span>
        </div>
      </div>
      <div class="region-row" id="regionRow"></div>
    </div>

    <div class="season-banner" id="seasonBanner"></div>

    <div class="sec-h"><h2 id="curTitle">이 계절 추천</h2><span class="cnt">시즌 맞춤</span></div>
    <div class="cur-row" id="curRow"></div>

    <div class="results-head"><h2>오토캠핑 추천</h2><span class="rc" id="resultCount"></span></div>
    <div class="list" id="list"></div>

    <footer>
      캠핑캐치 · 데이터 출처: 고캠핑(한국관광공사) 공개 API (이용허락범위 제한 없음)<br>
      가격·실시간 자리·후기는 고캠핑 정보에 없어 예약처/네이버로 연결합니다. 후기·실시간 자리 연동은 다음 단계 과제입니다.
    </footer>
  </main>

  <div class="backdrop" id="backdrop"></div>
  <aside class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="캠핑장 상세"></aside>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/sites.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
